<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aether Weather - Casablanca</title>

    <!-- Fonts -->

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Manrope:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Material Icons -->

    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="weather.css" />
  </head>

  <body>
    <header>
      <div class="header-left">
        <span class="material-symbols-outlined">location_on</span>
        <h1 class="location"></h1>
      </div>
      <div class="icon-btn">
        <span class="material-symbols-outlined btn-search">search</span>
        <input class="search-weather" type="text" />
      </div>
    </header>

    <main class="container-weather">
      <section class="hero"></section>

      <section class="forecast-air glass forecast"></section>
    </main>

    <script src="weather.js"></script>
  </body>
</html>
